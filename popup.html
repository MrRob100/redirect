<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    h2 { color: #a78bfa; margin: 0 0 10px; font-size: 15px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin: 0; }
    a {
      display: block;
      padding: 6px 8px;
      color: #e0e0e0;
      text-decoration: none;
      border-radius: 6px;
    }
    a:hover { background: #1f1f33; color: #a78bfa; }
  </style>
</head>
<body>
  <h2>Redirect</h2>
  <ul>
    <li><a href="https://instagram.com" target="_blank">instagram.com</a></li>
    <li><a href="https://facebook.com" target="_blank">facebook.com</a></li>
    <li><a href="https://youtube.com" target="_blank">youtube.com</a></li>
    <li><a href="https://bbc.co.uk" target="_blank">bbc.co.uk</a></li>
  </ul>
</body>
</html>
